name: EAS Preview Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: EAS Build (preview)
    runs-on: ubuntu-latest
    # Expone el secret como env de job para poder condicionar los pasos:
    # el secrets context no está disponible en los `if`, pero el env sí.
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Los pasos de EAS solo se ejecutan si EXPO_TOKEN está configurado.
      # Sin token, se omiten y el job queda en verde (no es un build obligatorio
      # en cada PR; el build nativo se lanza bajo demanda con `eas build`).
      - name: Setup EAS CLI
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npm install --global eas-cli

      - name: Build preview profile (all platforms)
        if: ${{ env.EXPO_TOKEN != '' }}
        run: eas build --platform all --profile preview --non-interactive
        working-directory: apps/mobile
