name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - apps/mobile/**
  workflow_dispatch:

jobs:
  deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export web
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export -p web

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: apps/mobile/dist/
          # Override the action's default excludes: the default drops
          # **/node_modules/**, but Expo's web assets (fonts, icons) live under
          # dist/assets/__node_modules/.pnpm/.../node_modules/... — excluding
          # them left the site without fonts. Keep only the .git excludes.
          exclude: |
            **/.git*
            **/.git*/**
